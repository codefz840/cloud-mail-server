name: Test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUD_MAIL_URL: ${{ secrets.CLOUD_MAIL_URL || vars.CLOUD_MAIL_URL }}
      TEST_MAIL_USER: ${{ secrets.TEST_MAIL_USER || vars.TEST_MAIL_USER }}
      TEST_MAIL_PASS: ${{ secrets.TEST_MAIL_PASS || vars.TEST_MAIL_PASS }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate integration environment
        if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
        run: |
          test -n "$CLOUD_MAIL_URL"
          test -n "$TEST_MAIL_USER"
          test -n "$TEST_MAIL_PASS"

      - name: Run tests
        run: npm test
