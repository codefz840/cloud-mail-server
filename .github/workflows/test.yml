name: Test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUD_MAIL_URL: ${{ secrets.CLOUD_MAIL_URL || vars.CLOUD_MAIL_URL }}
      TEST_MAIL_USER: ${{ secrets.TEST_MAIL_USER || vars.TEST_MAIL_USER }}
      TEST_MAIL_PASS: ${{ secrets.TEST_MAIL_PASS || vars.TEST_MAIL_PASS }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure DNS resolver
        run: |
          use_resolv_conf_fallback=true

          if command -v resolvectl >/dev/null 2>&1; then
            dns_link="$(ip route | awk '/^default/ {for (i = 1; i <= NF; i++) if ($i == "dev") {print $(i + 1); exit}}')"
            if [ -n "$dns_link" ]; then
              echo "Configuring resolvectl on link: $dns_link"
              if sudo resolvectl dns "$dns_link" 1.1.1.1 1.0.0.1; then
                sudo resolvectl flush-caches
                use_resolv_conf_fallback=false
              else
                echo "resolvectl DNS configuration failed; using /etc/resolv.conf fallback"
              fi
            else
              echo "No default route interface found; using /etc/resolv.conf fallback"
            fi
          else
            echo "resolvectl not available; using /etc/resolv.conf fallback"
          fi

          if [ "$use_resolv_conf_fallback" = "true" ]; then
            tmp_resolv="$(mktemp)"
            {
              echo 'nameserver 1.1.1.1'
              echo 'nameserver 1.0.0.1'
              awk '{
                if ($0 ~ /^[[:space:]]*#/) {
                  print
                  next
                }
                if ($1 == "nameserver" && ($2 == "1.1.1.1" || $2 == "1.0.0.1")) {
                  next
                }
                print
              }' /etc/resolv.conf
            } > "$tmp_resolv"
            sudo cp "$tmp_resolv" /etc/resolv.conf
            rm -f "$tmp_resolv"
          fi

      - name: Validate integration environment
        if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
        run: |
          test -n "$CLOUD_MAIL_URL"
          test -n "$TEST_MAIL_USER"
          test -n "$TEST_MAIL_PASS"

      - name: Run tests
        run: npm test
