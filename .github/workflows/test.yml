name: Test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUD_MAIL_URL: ${{ secrets.CLOUD_MAIL_URL || vars.CLOUD_MAIL_URL }}
      TEST_MAIL_USER: ${{ secrets.TEST_MAIL_USER || vars.TEST_MAIL_USER }}
      TEST_MAIL_PASS: ${{ secrets.TEST_MAIL_PASS || vars.TEST_MAIL_PASS }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure DNS resolver
        run: |
          if command -v resolvectl >/dev/null 2>&1; then
            dns_link="$(resolvectl status | awk '/^Link [0-9]+ \(/ {gsub(/[()]/, "", $3); link=$3} /Current Scopes:.*DNS/ {print link; exit}')"
            if [ -n "$dns_link" ]; then
              sudo resolvectl dns "$dns_link" 1.1.1.1 1.0.0.1
              sudo resolvectl flush-caches
            fi
          fi

          if ! grep -q '^nameserver 1.1.1.1$' /etc/resolv.conf; then
            sudo sh -c 'cat <<EOF >/etc/resolv.conf
            nameserver 1.1.1.1
            nameserver 1.0.0.1
            EOF'
          fi

      - name: Validate integration environment
        if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
        run: |
          test -n "$CLOUD_MAIL_URL"
          test -n "$TEST_MAIL_USER"
          test -n "$TEST_MAIL_PASS"

      - name: Run tests
        run: npm test
